version: "3.9"
services:
  bot:
    build: .
    container_name: bitcoin-hft-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./runtime:/app/runtime
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3; sqlite3.connect('runtime/trades.db').close(); print('ok')"]
      interval: 30s
      timeout: 5s
      retries: 3

  dashboard:
    build: .
    container_name: bitcoin-hft-dashboard
    restart: unless-stopped
    command: ["streamlit", "run", "dashboard_app.py", "--server.address", "0.0.0.0", "--server.port", "8501"]
    env_file:
      - .env
    volumes:
      - ./runtime:/app/runtime
    ports:
      - "8501:8501"
    depends_on:
      - bot
